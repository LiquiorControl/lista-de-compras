<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Compras por Categorías</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-800 pb-28 min-h-screen text-[15px]">

    <!-- Encabezado Principal -->
    <header class="sticky top-0 z-40 bg-emerald-600 text-white px-4 py-5 shadow-xl">
        <div class="max-w-md mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="bg-white/25 p-2 rounded-2xl backdrop-blur-md border border-white/30">
                    <i data-lucide="shopping-bag" class="w-6 h-6 text-white"></i>
                </div>
                <div>
                    <h1 class="text-xl font-black tracking-tight leading-none uppercase">Mis Compras</h1>
                    <p class="text-[10px] font-bold opacity-80 mt-1 uppercase tracking-widest">Organizado por categorías</p>
                </div>
            </div>
            <button onclick="resetAll()" class="p-2.5 bg-white/10 hover:bg-white/20 rounded-full transition-all active:rotate-180 duration-500">
                <i data-lucide="rotate-ccw" class="w-5 h-5 text-white"></i>
            </button>
        </div>
    </header>

    <main id="app-content" class="max-w-md mx-auto px-4 mt-6">
        <!-- Contenido dinámico -->
    </main>

    <!-- Navegación Inferior -->
    <nav class="fixed bottom-8 left-6 right-6 max-w-md mx-auto z-50">
        <div class="bg-slate-900/95 backdrop-blur-xl rounded-[2.5rem] p-2 flex gap-2 shadow-2xl border border-white/10 ring-1 ring-black/20">
            <button id="nav-stores" onclick="switchView('stores')" class="flex-1 py-4 rounded-[2rem] font-black text-[10px] uppercase tracking-widest flex items-center justify-center gap-3 transition-all bg-emerald-500 text-white shadow-inner scale-[1.03]">
                <i data-lucide="store" class="w-4 h-4"></i>
                TIENDAS
            </button>
            <button id="nav-summary" onclick="switchView('summary')" class="flex-1 py-4 rounded-[2rem] font-black text-[10px] uppercase tracking-widest flex items-center justify-center gap-3 transition-all text-slate-400 relative">
                <i data-lucide="clipboard-list" class="w-4 h-4"></i>
                RESUMEN
                <span id="badge-count" class="hidden absolute -top-1 right-6 bg-white text-slate-900 text-[10px] w-6 h-6 rounded-full flex items-center justify-center font-black shadow-lg ring-4 ring-slate-900 border-2 border-slate-900">0</span>
            </button>
        </div>
    </nav>

    <script>
        const INITIAL_DATA = {
            "Restaurant Depot": {
                "Carnes": ["Pollo", "Carne Tacos", "Costillas", "Chorizo", "Caldo Pollo"],
                "Vegetales": ["Cebolla", "Cilantro", "Perejil", "Lechuga", "Ajos", "Jalapeños", "Plátanos", "Pimiento Verde", "Chile Árbol", "Mix Vegetales", "Maíz", "Pimiento Diced", "Pimiento Rojo", "Albahaca", "Orégano", "Menta"],
                "Lácteos y Frío": ["Sour Cream", "Margarina", "Queso Mozzarella", "Queso James", "Marg. Líquida", "Mayonesa"],
                "Abarrotes y Especias": ["Frijoles", "Tomate Lata", "Arroz", "Sal", "Azúcar", "Pan Rayado", "Pan Burger", "Harina Pollo", "Sazón Azafrán", "Pimienta", "Paprika", "Mostaza", "Adobo", "Comino", "Ketchup", "Banana Pepper"],
                "Congelados": ["Papas Fritas", "Tortilla Maíz", "Tortilla n12", "Tacos N6", "Churros"],
                "Bebidas": ["Red Bull Watermelon", "Red Bull Sugar Free"],
                "Limpieza y Empaque": ["Aluminio", "Cajas Q1", "Cajas G1", "Cajas 206", "Cubiertos", "Bolsas Basura", "Guantes", "Detergente", "Desengrasante", "Potes Salsa", "Bolsas Llevar", "Limones", "Papel", "Fibra verde", "Piedra plancha", "Servilletas B", "Aceite Freír"]
            },
            "Sams Club": {
                "Panadería": ["Pan Lomo", "Pan Chori"],
                "Abarrotes": ["Arroz"],
                "Bebidas": ["Agua", "Red Bull"],
                "Carnes": ["Costillas"],
                "Limpieza": ["Cloro", "Fabuloso"],
                "Empaque": ["Bolsas Llevar", "Servilletas Bar", "Vasos Agua"]
            },
            "Walmart": {
                "Carnes": ["Jamón", "Sirloni", "Carne Hamb.", "Carne Empan.", "Milanesa"],
                "Sodas": ["Coca", "Coca Diet", "Lemonade", "Sprite", "Fanta", "Ginger Ale"],
                "Lácteos": ["Leche", "Huevos"],
                "Vegetales": ["Perejil", "Tomate", "Aguacate"],
                "Otros": ["Aceite Paella"]
            },
            "GFS Gordon": {
                "Carnes": ["Chorizos Paella", "Carne Asada", "Fish Tacos"],
                "Vegetales": ["Cebolla", "Plátanos"],
                "Empaque": ["Servilletas Bar"]
            }
        };

        const STORE_THEMES = {
            "Restaurant Depot": "bg-blue-600",
            "Sams Club": "bg-purple-600",
            "Walmart": "bg-amber-500",
            "GFS Gordon": "bg-rose-600"
        };

        let state = {
            quantities: JSON.parse(localStorage.getItem('shop-q-v6') || '{}'),
            checked: JSON.parse(localStorage.getItem('shop-c-v6') || '{}'),
            activeStore: "Restaurant Depot",
            searchTerm: "",
            view: "stores"
        };

        function save() {
            localStorage.setItem('shop-q-v6', JSON.stringify(state.quantities));
            localStorage.setItem('shop-c-v6', JSON.stringify(state.checked));
            updateBadge();
        }

        function updateBadge() {
            const count = Object.values(state.quantities).filter(q => q > 0).length;
            const badge = document.getElementById('badge-count');
            if (count > 0) {
                badge.textContent = count;
                badge.classList.remove('hidden');
            } else {
                badge.classList.add('hidden');
            }
        }

        function resetAll() {
            if(confirm("¿Estás seguro de borrar todos los datos?")) {
                state.quantities = {};
                state.checked = {};
                save();
                render();
            }
        }

        function switchView(view) {
            state.view = view;
            const btnStores = document.getElementById('nav-stores');
            const btnSummary = document.getElementById('nav-summary');

            if (view === 'stores') {
                btnStores.className = "flex-1 py-4 rounded-[2rem] font-black text-[10px] uppercase tracking-widest flex items-center justify-center gap-3 transition-all bg-emerald-500 text-white shadow-inner scale-[1.03]";
                btnSummary.className = "flex-1 py-4 rounded-[2rem] font-black text-[10px] uppercase tracking-widest flex items-center justify-center gap-3 transition-all text-slate-400 relative";
            } else {
                btnSummary.className = "flex-1 py-4 rounded-[2rem] font-black text-[10px] uppercase tracking-widest flex items-center justify-center gap-3 transition-all bg-rose-500 text-white shadow-inner scale-[1.03] relative";
                btnStores.className = "flex-1 py-4 rounded-[2rem] font-black text-[10px] uppercase tracking-widest flex items-center justify-center gap-3 transition-all text-slate-400";
            }
            render();
        }

        function updateQuantity(item, delta) {
            const current = state.quantities[item] || 0;
            const next = Math.max(0, current + delta);
            if (next === 0) delete state.quantities[item];
            else state.quantities[item] = next;
            save();
            render();
        }

        function handleInput(item, value) {
            const num = parseInt(value) || 0;
            if (num <= 0) delete state.quantities[item];
            else state.quantities[item] = num;
            save();
            updateBadge();
        }

        function toggleCheck(item) {
            state.checked[item] = !state.checked[item];
            save();
            render();
        }

        function render() {
            const container = document.getElementById('app-content');
            if (state.view === 'stores') renderStoresView(container);
            else renderSummaryView(container);
            lucide.createIcons();
        }

        function renderStoresView(container) {
            let html = `
                <div class="flex overflow-x-auto gap-3 mb-6 no-scrollbar py-2 sticky top-[76px] z-30 bg-slate-50">
                    ${Object.keys(INITIAL_DATA).map(store => `
                        <button onclick="state.activeStore='${store}'; render();" 
                            class="flex-shrink-0 px-5 py-3 rounded-2xl text-[11px] font-black tracking-wider transition-all transform active:scale-90 ${state.activeStore === store ? STORE_THEMES[store] + ' text-white shadow-lg ring-2 ring-white ring-offset-2' : 'bg-white text-slate-500 border border-slate-200'}">
                            ${store.toUpperCase()}
                        </button>
                    `).join('')}
                </div>
                <div class="relative mb-6 group sticky top-[138px] z-30 bg-slate-50 pb-2">
                    <div class="absolute inset-y-0 left-4 flex items-center pointer-events-none pb-2">
                        <i data-lucide="search" class="text-slate-400 w-5 h-5"></i>
                    </div>
                    <input type="text" placeholder="Buscar..." 
                        oninput="state.searchTerm = this.value; renderItemsOnly();"
                        value="${state.searchTerm}"
                        class="w-full pl-12 pr-4 py-4 bg-white border-2 border-transparent rounded-2xl focus:ring-4 focus:ring-emerald-500/10 focus:border-emerald-500 outline-none shadow-sm transition-all font-semibold"
                    />
                </div>
                <div id="items-list" class="space-y-8"></div>
            `;
            container.innerHTML = html;
            renderItemsOnly();
        }

        function renderItemsOnly() {
            const listContainer = document.getElementById('items-list');
            const categories = INITIAL_DATA[state.activeStore];
            let html = '';
            let foundAny = false;

            for (const [catName, items] of Object.entries(categories)) {
                const filteredItems = items.filter(i => i.toLowerCase().includes(state.searchTerm.toLowerCase()));
                if (filteredItems.length > 0) {
                    foundAny = true;
                    html += `
                        <div class="space-y-3">
                            <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest pl-2">${catName}</h3>
                            <div class="space-y-3">
                                ${filteredItems.map(item => {
                                    const isChecked = state.checked[item];
                                    return `
                                        <div class="bg-white p-4 rounded-2xl border border-slate-100 flex items-center justify-between shadow-sm transition-all ${isChecked ? 'opacity-40 grayscale-[0.5]' : ''}">
                                            <div class="flex items-center gap-4 flex-1 min-w-0" onclick="toggleCheck('${item}')">
                                                <button class="flex-shrink-0 w-8 h-8 rounded-xl border-2 flex items-center justify-center transition-all ${isChecked ? 'bg-emerald-500 border-emerald-500 text-white shadow-sm' : 'border-slate-200 bg-white'}">
                                                    ${isChecked ? '<i data-lucide="check-circle-2" class="w-4 h-4"></i>' : ''}
                                                </button>
                                                <span class="font-bold text-slate-700 truncate ${isChecked ? 'line-through' : ''}">${item}</span>
                                            </div>
                                            <div class="flex items-center gap-1 bg-slate-50 p-1.5 rounded-xl ml-4 border border-slate-100">
                                                <button onclick="updateQuantity('${item}', -1)" class="w-9 h-9 flex items-center justify-center text-rose-500 active:scale-75"><i data-lucide="minus" class="w-4 h-4"></i></button>
                                                <input type="number" class="w-10 text-center bg-transparent font-black text-lg outline-none" value="${state.quantities[item] || ""}" placeholder="0" oninput="handleInput('${item}', this.value)" />
                                                <button onclick="updateQuantity('${item}', 1)" class="w-9 h-9 flex items-center justify-center text-emerald-600 active:scale-75"><i data-lucide="plus" class="w-4 h-4"></i></button>
                                            </div>
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                        </div>
                    `;
                }
            }

            if (!foundAny) {
                listContainer.innerHTML = `<div class="text-center py-20 text-slate-300 font-bold">No encontrado</div>`;
            } else {
                listContainer.innerHTML = html;
            }
            lucide.createIcons();
        }

        function renderSummaryView(container) {
            const summaryData = [];
            for (const [store, categories] of Object.entries(INITIAL_DATA)) {
                const storeItems = [];
                for (const [cat, items] of Object.entries(categories)) {
                    const selectedInCat = items.filter(i => state.quantities[i] > 0);
                    if (selectedInCat.length > 0) {
                        storeItems.push({ cat, items: selectedInCat });
                    }
                }
                if (storeItems.length > 0) summaryData.push({ store, categories: storeItems });
            }

            let html = `
                <div class="animate-in fade-in duration-300">
                    <div class="flex items-center justify-between mb-8">
                        <h2 class="text-2xl font-black text-slate-800 tracking-tight">Mi Carrito</h2>
                        <div class="bg-emerald-100 text-emerald-700 px-4 py-1.5 rounded-full font-black text-xs">
                            ${Object.values(state.quantities).filter(q => q > 0).length} ITEMS
                        </div>
                    </div>
            `;

            if (summaryData.length > 0) {
                html += `<div class="space-y-10">`;
                summaryData.forEach(s => {
                    html += `
                        <div class="bg-white rounded-[2.5rem] border border-slate-100 overflow-hidden shadow-md">
                            <div class="${STORE_THEMES[s.store]} px-8 py-4 text-white">
                                <span class="text-[10px] font-black tracking-[0.3em] uppercase">${s.store}</span>
                            </div>
                            <div class="p-4 space-y-6">
                                ${s.categories.map(c => `
                                    <div class="space-y-2">
                                        <h4 class="text-[10px] font-black text-slate-300 uppercase tracking-tighter">${c.cat}</h4>
                                        <div class="space-y-1">
                                            ${c.items.map(item => `
                                                <div onclick="toggleCheck('${item}')" class="py-3 flex items-center justify-between transition-all ${state.checked[item] ? 'opacity-40' : ''}">
                                                    <div class="flex items-center gap-3">
                                                        <div class="w-7 h-7 rounded-lg border-2 flex items-center justify-center ${state.checked[item] ? 'bg-emerald-500 border-emerald-500 text-white' : 'border-slate-200'}">
                                                            ${state.checked[item] ? '<i data-lucide="check-circle-2" class="w-4 h-4"></i>' : ''}
                                                        </div>
                                                        <span class="font-bold text-sm ${state.checked[item] ? 'line-through' : ''}">${item}</span>
                                                    </div>
                                                    <span class="bg-slate-800 text-white font-black w-9 h-9 flex items-center justify-center rounded-xl text-xs shadow-sm">${state.quantities[item]}</span>
                                                </div>
                                            `).join('')}
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `;
                });
                html += `</div>`;
            } else {
                html += `<div class="text-center py-20 bg-white rounded-[3rem] border-4 border-dashed border-slate-100 flex flex-col items-center gap-4">
                    <i data-lucide="shopping-cart" class="w-12 h-12 text-slate-200"></i>
                    <p class="text-slate-400 font-bold uppercase text-[10px] tracking-widest">Carrito vacío</p>
                </div>`;
            }
            html += `</div>`;
            container.innerHTML = html;
        }

        window.onload = () => {
            updateBadge();
            render();
        };
    </script>
</body>
</html>
