<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mi Lista de Suministros</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body { font-family: 'Inter', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }

        .view-transition {
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .modal-overlay {
            background-color: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 pb-32 min-h-screen select-none">

    <!-- Header Fijo -->
    <header class="sticky top-0 z-50 bg-emerald-600 text-white px-4 py-4 shadow-lg border-b border-emerald-700">
        <div class="max-w-md mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="bg-white/20 p-2 rounded-xl backdrop-blur-md">
                    <i data-lucide="shopping-cart" class="w-6 h-6 text-white"></i>
                </div>
                <div>
                    <h1 class="text-lg font-black leading-none uppercase tracking-tight text-white">Logística App</h1>
                    <p id="cloud-status" class="text-[9px] font-bold opacity-70 uppercase tracking-widest mt-1 text-white">Conectando...</p>
                </div>
            </div>
            <div class="flex gap-1">
                <button onclick="window.toggleCloudModal()" class="p-2.5 bg-white/10 hover:bg-white/20 rounded-full transition-all" title="Sincronizar">
                    <i data-lucide="share-2" class="w-5 h-5 text-white"></i>
                </button>
                <button onclick="window.copyToClipboard()" class="p-2.5 bg-white/10 hover:bg-white/20 rounded-full transition-all" title="Copiar texto">
                    <i data-lucide="copy" class="w-5 h-5 text-white"></i>
                </button>
                <button onclick="window.resetAll()" class="p-2.5 bg-rose-500/20 hover:bg-rose-500/40 rounded-full transition-all" title="Borrar todo">
                    <i data-lucide="trash-2" class="w-5 h-5 text-white"></i>
                </button>
            </div>
        </div>
    </header>

    <main id="app-content" class="max-w-md mx-auto px-4 mt-6 mb-10">
        <!-- Contenido generado por JS -->
    </main>

    <!-- Modal de Transferencia -->
    <div id="cloud-modal" class="fixed inset-0 z-[60] hidden flex items-center justify-center p-4 modal-overlay">
        <div class="bg-white rounded-[2.5rem] w-full max-w-sm overflow-hidden shadow-2xl view-transition max-h-[90vh] overflow-y-auto no-scrollbar">
            <div class="bg-emerald-600 p-6 text-white flex justify-between items-center sticky top-0 z-10">
                <h3 class="font-black uppercase text-sm tracking-widest">Transferir Lista</h3>
                <button onclick="window.toggleCloudModal()"><i data-lucide="x" class="w-5 h-5 text-white"></i></button>
            </div>
            
            <div class="p-6 space-y-8">
                <!-- Opción A: Archivo -->
                <div class="space-y-4">
                    <h4 class="text-[10px] font-black text-slate-400 uppercase tracking-widest border-b pb-2">Opción A: Por WhatsApp</h4>
                    <button onclick="window.exportDataFile()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black text-xs uppercase tracking-widest flex items-center justify-center gap-2 shadow-lg shadow-blue-100">
                        <i data-lucide="file-output" class="w-4 h-4 text-white"></i>
                        Exportar para WhatsApp
                    </button>
                    <p class="text-[10px] text-center text-slate-500 px-4 italic leading-tight">Envía el archivo descargado. En el otro móvil dale a "Importar".</p>
                    
                    <label class="w-full bg-slate-100 text-slate-700 py-4 rounded-2xl font-black text-xs uppercase tracking-widest flex items-center justify-center gap-2 cursor-pointer border-2 border-dashed border-slate-300">
                        <i data-lucide="file-input" class="w-4 h-4 text-slate-600"></i>
                        Importar Archivo
                        <input type="file" id="import-file" class="hidden" accept=".json" onchange="window.importDataFile(event)">
                    </label>
                </div>

                <!-- Opción B: Nube -->
                <div class="space-y-4 pt-4">
                    <h4 class="text-[10px] font-black text-slate-400 uppercase tracking-widest border-b pb-2">Opción B: Por Código (Nube)</h4>
                    <button onclick="window.uploadToCloud()" class="w-full bg-emerald-500 text-white py-4 rounded-2xl font-black text-xs uppercase tracking-widest flex items-center justify-center gap-2 shadow-lg shadow-emerald-100">
                        <i data-lucide="cloud-upload" class="w-4 h-4 text-white"></i>
                        Subir a la Nube
                    </button>
                    
                    <div class="bg-slate-50 p-4 rounded-2xl border-2 border-slate-100 space-y-3">
                        <input type="text" id="input-sync-code" value="123456" placeholder="Código" class="w-full px-4 py-3 bg-white border border-slate-200 rounded-xl outline-none focus:border-emerald-500 text-center font-black tracking-widest uppercase text-sm">
                        <button onclick="window.downloadFromCloud()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black text-xs uppercase tracking-widest flex items-center justify-center gap-2">
                            <i data-lucide="cloud-download" class="w-4 h-4 text-white"></i>
                            Cargar de la Nube
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Navegación Inferior -->
    <nav class="fixed bottom-6 left-4 right-4 max-w-md mx-auto z-50">
        <div class="bg-slate-900/95 backdrop-blur-xl rounded-[2.5rem] p-2 flex gap-2 shadow-2xl border border-white/10 ring-1 ring-black/20">
            <button id="nav-stores" onclick="window.switchView('stores')" class="flex-1 py-4 rounded-[2rem] font-black text-[10px] uppercase tracking-widest flex items-center justify-center gap-3 transition-all bg-emerald-500 text-white shadow-lg">
                <i data-lucide="store" class="w-4 h-4 text-white"></i>
                Tiendas
            </button>
            <button id="nav-summary" onclick="window.switchView('summary')" class="flex-1 py-4 rounded-[2rem] font-black text-[10px] uppercase tracking-widest flex items-center justify-center gap-3 transition-all text-slate-400 relative">
                <i data-lucide="clipboard-check" class="w-4 h-4 text-slate-400"></i>
                Resumen
                <span id="badge-count" class="hidden absolute -top-1 right-6 bg-rose-500 text-white text-[9px] w-5 h-5 rounded-full flex items-center justify-center font-black ring-4 ring-slate-900">0</span>
            </button>
        </div>
    </nav>

    <!-- Botón Flotante para Descargar Resumen -->
    <div id="download-fab" class="fixed bottom-24 right-6 hidden z-40">
        <button onclick="window.downloadList()" class="bg-blue-600 text-white p-4 rounded-full shadow-2xl active:scale-90 transition-transform">
            <i data-lucide="file-text" class="w-6 h-6 text-white"></i>
        </button>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, signInAnonymously, signInWithCustomToken } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, doc, setDoc, getDoc } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : '123456';

        async function initAuth() {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
                document.getElementById('cloud-status').innerText = 'En Línea';
            } catch (error) {
                document.getElementById('cloud-status').innerText = 'Sin Nube';
            }
        }
        initAuth();

        const INITIAL_DATA = {
            "Restaurant Depot": {
                "Carnes": ["Pollo", "Carne Tacos", "Costillas", "Chorizo", "Caldo Pollo"],
                "Vegetales": ["Cebolla", "Cilantro", "Perejil", "Lechuga", "Ajos", "Jalapeños", "Plátanos", "Pimiento Verde", "Chile Árbol", "Mix Vegetales", "Maíz", "Pimiento Diced", "Pimiento Rojo", "Albahaca", "Orégano", "Menta"],
                "Lácteos y Frío": ["Sour Cream", "Margarina", "Queso Mozzarella", "Queso James", "Marg. Líquida", "Mayonesa"],
                "Abarrotes": ["Frijoles", "Tomate Lata", "Arroz", "Sal", "Azúcar", "Pan Rayado", "Pan Burger", "Harina Pollo", "Sazón Azafrán", "Pimienta", "Paprika", "Mostaza", "Adobo", "Comino", "Ketchup", "Banana Pepper"],
                "Congelados": ["Papas Fritas", "Tortilla Maíz", "Tortilla n12", "Tortillas N6", "Churros"],
                "Bebidas": ["Red Bull Watermelon", "Red Bull Sugar Free"],
                "Insumos": ["Aluminio", "Cajas Q1", "Cajas G1", "Cajas 206", "Cubiertos", "Bolsas Basura", "Guantes", "Detergente", "Desengrasante", "Potes Salsa", "Bolsas Llevar", "Limones", "Papel", "Fibra verde", "Piedra plancha", "Servilletas B", "Aceite Freír"]
            },
            "Sams Club": {
                "Panadería": ["Pan Lomo", "Pan Chori"],
                "Abarrotes": ["Arroz"],
                "Bebidas": ["Agua", "Red Bull"],
                "Carnes": ["Costillas"],
                "Limpieza": ["Cloro", "Fabuloso"],
                "Empaque": ["Bolsas Llevar", "Servilletas Bar", "Vasos Agua"]
            },
            "Walmart": {
                "Carnes": ["Jamón", "Sirloni", "Carne Hamb.", "Carne Empan.", "Milanesa"],
                "Bebidas": ["Coca", "Coca Diet", "Lemonade", "Sprite", "Fanta", "Ginger Ale", "Michelob Ultra", "Heineken", "Sweet Tea", "Unsweet Tea"],
                "Lácteos": ["Leche", "Huevos"],
                "Vegetales": ["Perejil", "Tomate", "Aguacate"],
                "Otros": ["Aceite Paella"]
            },
            "GFS Gordon": {
                "Carnes": ["Chorizos Paella", "Carne Asada", "Fish Tacos"],
                "Vegetales": ["Cebolla", "Plátanos"],
                "Empaque": ["Servilletas Bar"]
            }
        };

        const STORE_THEMES = {
            "Restaurant Depot": "bg-blue-600",
            "Sams Club": "bg-purple-600",
            "Walmart": "bg-amber-500",
            "GFS Gordon": "bg-rose-600"
        };

        // Ponemos el estado en window para que sea accesible desde los onclick inline
        window.state = {
            quantities: JSON.parse(localStorage.getItem('rest-q-v10') || '{}'),
            checked: JSON.parse(localStorage.getItem('rest-c-v10') || '{}'),
            activeStore: "Restaurant Depot",
            searchTerm: "",
            view: "stores"
        };

        // --- ASIGNACIÓN GLOBAL ---
        window.save = () => {
            localStorage.setItem('rest-q-v10', JSON.stringify(window.state.quantities));
            localStorage.setItem('rest-c-v10', JSON.stringify(window.state.checked));
            window.updateBadge();
        };

        window.updateBadge = () => {
            const count = Object.values(window.state.quantities).filter(q => q > 0).length;
            const badge = document.getElementById('badge-count');
            if (count > 0) {
                badge.textContent = count;
                badge.classList.remove('hidden');
            } else {
                badge.classList.add('hidden');
            }
        };

        window.toggleCloudModal = () => {
            document.getElementById('cloud-modal').classList.toggle('hidden');
        };

        window.exportDataFile = () => {
            const data = { quantities: window.state.quantities, checked: window.state.checked };
            const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `LOGISTICA_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
        };

        window.importDataFile = (event) => {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    if (data.quantities) {
                        window.state.quantities = data.quantities;
                        window.state.checked = data.checked || {};
                        window.save();
                        window.render();
                        alert("¡Datos importados!");
                        window.toggleCloudModal();
                    }
                } catch (err) { alert("Archivo inválido"); }
            };
            reader.readAsText(file);
        };

        window.uploadToCloud = async () => {
            if (!auth.currentUser) return alert("Error de conexión");
            const code = document.getElementById('input-sync-code').value.trim() || "123456";
            const listRef = doc(db, 'artifacts', appId, 'public', 'data', 'cloud_lists', code);
            try {
                await setDoc(listRef, {
                    quantities: window.state.quantities,
                    checked: window.state.checked,
                    updatedAt: new Date().getTime()
                });
                alert("¡Guardado en la nube con código " + code + "!");
            } catch (e) { alert("Error al subir"); }
        };

        window.downloadFromCloud = async () => {
            const code = document.getElementById('input-sync-code').value.trim() || "123456";
            const listRef = doc(db, 'artifacts', appId, 'public', 'data', 'cloud_lists', code);
            try {
                const snap = await getDoc(listRef);
                if (snap.exists()) {
                    const data = snap.data();
                    window.state.quantities = data.quantities || {};
                    window.state.checked = data.checked || {};
                    window.save();
                    window.render();
                    window.toggleCloudModal();
                    alert("¡Lista cargada!");
                } else { alert("Código no encontrado"); }
            } catch (e) { alert("Error al descargar"); }
        };

        window.resetAll = () => {
            if (confirm("¿Borrar todo?")) {
                window.state.quantities = {};
                window.state.checked = {};
                window.save();
                window.render();
            }
        };

        window.switchView = (view) => {
            window.state.view = view;
            const btnStores = document.getElementById('nav-stores');
            const btnSummary = document.getElementById('nav-summary');
            const downloadBtn = document.getElementById('download-fab');

            if (view === 'stores') {
                btnStores.className = "flex-1 py-4 rounded-[2rem] font-black text-[10px] uppercase tracking-widest flex items-center justify-center gap-3 transition-all bg-emerald-500 text-white shadow-lg";
                btnSummary.className = "flex-1 py-4 rounded-[2rem] font-black text-[10px] uppercase tracking-widest flex items-center justify-center gap-3 transition-all text-slate-400 relative";
                downloadBtn.classList.add('hidden');
            } else {
                btnSummary.className = "flex-1 py-4 rounded-[2rem] font-black text-[10px] uppercase tracking-widest flex items-center justify-center gap-3 transition-all bg-emerald-500 text-white shadow-lg relative";
                btnStores.className = "flex-1 py-4 rounded-[2rem] font-black text-[10px] uppercase tracking-widest flex items-center justify-center gap-3 transition-all text-slate-400";
                downloadBtn.classList.remove('hidden');
            }
            window.render();
        };

        window.updateQuantity = (item, delta) => {
            const current = window.state.quantities[item] || 0;
            const next = Math.max(0, current + delta);
            if (next === 0) delete window.state.quantities[item];
            else window.state.quantities[item] = next;
            window.save();
            window.render();
        };

        window.handleInput = (item, value) => {
            const num = parseInt(value) || 0;
            if (num <= 0) delete window.state.quantities[item];
            else window.state.quantities[item] = num;
            window.save();
        };

        window.toggleCheck = (item) => {
            window.state.checked[item] = !window.state.checked[item];
            window.save();
            window.render();
        };

        window.copyToClipboard = () => {
            let text = `LISTA DE COMPRAS - ${new Date().toLocaleDateString()}\n\n`;
            for (const [store, categories] of Object.entries(INITIAL_DATA)) {
                let sHas = false;
                let sTxt = `${store.toUpperCase()}\n`;
                for (const [cat, items] of Object.entries(categories)) {
                    const sel = items.filter(i => window.state.quantities[i] > 0);
                    if (sel.length > 0) {
                        sHas = true;
                        sTxt += `[${cat}]\n`;
                        sel.forEach(i => sTxt += `${window.state.checked[i] ? '✓' : '•'} ${i}: ${window.state.quantities[i]}\n`);
                    }
                }
                if (sHas) text += sTxt + `\n`;
            }
            const ta = document.createElement("textarea");
            ta.value = text;
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
            alert("¡Texto copiado!");
        };

        window.downloadList = () => {
            let text = `RESUMEN - ${new Date().toLocaleDateString()}\n\n`;
            for (const [store, categories] of Object.entries(INITIAL_DATA)) {
                let sHas = false;
                let sTxt = `${store.toUpperCase()}\n`;
                for (const [cat, items] of Object.entries(categories)) {
                    const sel = items.filter(i => window.state.quantities[i] > 0);
                    if (sel.length > 0) {
                        sHas = true;
                        sTxt += `[${cat}]\n`;
                        sel.forEach(i => sTxt += `${window.state.checked[i] ? '✓' : '•'} ${i}: ${window.state.quantities[i]}\n`);
                    }
                }
                if (sHas) text += sTxt + `\n`;
            }
            const blob = new Blob([text], { type: 'text/plain' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `resumen_compras.txt`;
            a.click();
        };

        window.render = () => {
            const container = document.getElementById('app-content');
            if (!container) return;
            container.className = "max-w-md mx-auto px-4 mt-6 mb-10 view-transition";
            if (window.state.view === 'stores') renderStoresView(container);
            else renderSummaryView(container);
            lucide.createIcons();
        };

        function renderStoresView(container) {
            container.innerHTML = `
                <div class="flex overflow-x-auto gap-3 mb-6 no-scrollbar py-2 sticky top-[76px] z-30 bg-slate-50">
                    ${Object.keys(INITIAL_DATA).map(store => `
                        <button onclick="window.state.activeStore='${store}'; window.render();" 
                            class="flex-shrink-0 px-6 py-3 rounded-2xl text-[10px] font-black tracking-widest transition-all ${window.state.activeStore === store ? STORE_THEMES[store] + ' text-white shadow-lg ring-2 ring-white ring-offset-2' : 'bg-white text-slate-500 border border-slate-200'}">
                            ${store.toUpperCase()}
                        </button>
                    `).join('')}
                </div>
                <div class="relative mb-6 sticky top-[138px] z-30 bg-slate-50 pb-2">
                    <i data-lucide="search" class="absolute left-4 top-4 text-slate-400 w-5 h-5"></i>
                    <input type="text" placeholder="Buscar..." oninput="window.state.searchTerm = this.value; window.renderItemsOnly();" value="${window.state.searchTerm}"
                        class="w-full pl-12 pr-4 py-4 bg-white border-2 border-slate-100 rounded-2xl outline-none shadow-sm font-bold text-sm" />
                </div>
                <div id="items-list" class="space-y-8"></div>
            `;
            window.renderItemsOnly();
        }

        window.renderItemsOnly = () => {
            const listContainer = document.getElementById('items-list');
            if (!listContainer) return;
            const categories = INITIAL_DATA[window.state.activeStore];
            let html = '';
            for (const [catName, items] of Object.entries(categories)) {
                const filtered = items.filter(i => i.toLowerCase().includes(window.state.searchTerm.toLowerCase()));
                if (filtered.length > 0) {
                    html += `<div class="space-y-4"><h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest pl-2">${catName}</h3><div class="space-y-3">`;
                    html += filtered.map(item => `
                        <div class="bg-white p-4 rounded-2xl border border-slate-100 flex items-center justify-between shadow-sm ${window.state.checked[item] ? 'opacity-40 grayscale' : ''}">
                            <div class="flex items-center gap-4 flex-1 min-w-0" onclick="window.toggleCheck('${item}')">
                                <button class="flex-shrink-0 w-8 h-8 rounded-xl border-2 flex items-center justify-center transition-all ${window.state.checked[item] ? 'bg-emerald-500 border-emerald-500 text-white' : 'border-slate-200 bg-white'}">
                                    ${window.state.checked[item] ? '<i data-lucide="check" class="w-5 h-5 text-white"></i>' : ''}
                                </button>
                                <span class="font-bold text-slate-700 truncate ${window.state.checked[item] ? 'line-through' : ''}">${item}</span>
                            </div>
                            <div class="flex items-center gap-1 bg-slate-50 p-1 rounded-xl ml-4 border border-slate-100">
                                <button onclick="window.updateQuantity('${item}', -1)" class="w-9 h-9 flex items-center justify-center text-rose-500"><i data-lucide="minus" class="w-4 h-4"></i></button>
                                <input type="number" class="w-10 text-center bg-transparent font-black text-lg outline-none" value="${window.state.quantities[item] || ""}" placeholder="0" oninput="window.handleInput('${item}', this.value)" />
                                <button onclick="window.updateQuantity('${item}', 1)" class="w-9 h-9 flex items-center justify-center text-emerald-600"><i data-lucide="plus" class="w-4 h-4"></i></button>
                            </div>
                        </div>`).join('');
                    html += `</div></div>`;
                }
            }
            listContainer.innerHTML = html || `<div class="text-center py-20 text-slate-300 font-bold uppercase tracking-widest text-[10px]">Vacío</div>`;
            lucide.createIcons();
        };

        function renderSummaryView(container) {
            const summaryData = [];
            for (const [store, categories] of Object.entries(INITIAL_DATA)) {
                const sItems = [];
                for (const [cat, items] of Object.entries(categories)) {
                    const sel = items.filter(i => window.state.quantities[i] > 0);
                    if (sel.length > 0) sItems.push({ cat, items: sel });
                }
                if (sItems.length > 0) summaryData.push({ store, categories: sItems });
            }
            let html = `<div class="mb-8"><h2 class="text-3xl font-black text-slate-800 tracking-tighter">Resumen</h2></div>`;
            if (summaryData.length > 0) {
                html += `<div class="space-y-10 pb-10">`;
                summaryData.forEach(s => {
                    html += `<div class="bg-white rounded-[2.5rem] border border-slate-100 overflow-hidden shadow-xl">
                        <div class="${STORE_THEMES[s.store]} px-8 py-5 text-white flex justify-between items-center"><span class="text-[11px] font-black tracking-[0.3em] uppercase text-white">${s.store}</span></div>
                        <div class="p-6 space-y-8">${s.categories.map(c => `
                            <div class="space-y-3"><h4 class="text-[9px] font-black text-slate-300 uppercase tracking-widest border-b pb-1">${c.cat}</h4>
                                <div class="space-y-1">${c.items.map(item => `
                                    <div onclick="window.toggleCheck('${item}')" class="py-3 flex items-center justify-between transition-all ${window.state.checked[item] ? 'opacity-30 grayscale' : ''}">
                                        <div class="flex items-center gap-4">
                                            <div class="w-7 h-7 rounded-lg border-2 flex items-center justify-center ${window.state.checked[item] ? 'bg-emerald-500 border-emerald-500 text-white' : 'border-slate-200'}">
                                                ${window.state.checked[item] ? '<i data-lucide="check" class="w-4 h-4 text-white"></i>' : ''}</div>
                                            <span class="font-bold text-sm text-slate-700 ${window.state.checked[item] ? 'line-through' : ''}">${item}</span></div>
                                        <span class="bg-slate-900 text-white font-black w-10 h-10 flex items-center justify-center rounded-2xl text-xs ring-4 ring-slate-50">${window.state.quantities[item]}</span>
                                    </div>`).join('')}</div></div>`).join('')}</div></div>`;
                });
                html += `</div>`;
            } else { html += `<div class="text-center py-24 bg-white rounded-[3rem] border-4 border-dashed border-slate-200 font-bold text-slate-400">LISTA VACÍA</div>`; }
            container.innerHTML = html;
        }

        window.onload = () => { window.updateBadge(); window.render(); };
    </script>
</body>
</html>
